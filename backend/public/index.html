<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Rental - Owner</title>
</head>
<body>

<h2>Owner Registration</h2>

<form id="registerForm" enctype="multipart/form-data">
  <input type="text" name="name" placeholder="Name" required /><br><br>
  <input type="email" name="email" placeholder="Email" required /><br><br>
  <input type="password" name="password" placeholder="Password" required /><br><br>
  <input type="file" name="aadhar" required /><br><br>
  <button type="submit">Register</button>
</form>

<hr>

<h2>Login</h2>

<form id="loginForm">
  <input type="email" name="email" placeholder="Email" required /><br><br>
  <input type="password" name="password" placeholder="Password" required /><br><br>
  <button type="submit">Login</button>
</form>

<script>
  const registerForm = document.getElementById("registerForm");
  const loginForm = document.getElementById("loginForm");

  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(registerForm);

    const response = await fetch("http://localhost:5000/api/common/register/owner", {
      method: "POST",
      body: formData,
      credentials: "include"
    });

    const data = await response.json();
    alert(data.message);
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(loginForm);

    const response = await fetch("http://localhost:5000/api/common/login", {
      method: "POST",
      body: JSON.stringify(Object.fromEntries(formData)),
      headers: { "Content-Type": "application/json" },
      credentials: "include"
    });

    const data = await response.json();
    alert(data.message);
  });
</script>

</body>
</html>
